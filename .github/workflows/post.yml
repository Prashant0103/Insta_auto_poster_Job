name: Instagram Auto Poster

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST every day
    - cron: '30 3 * * *'
  workflow_dispatch:    # Allows manual trigger from GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Kill if stuck (transcoding usually < 5 min)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Instagram Auto Poster
        env:
          # ── Pexels ─────────────────────────────────────────────────
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PEXELS_QUERY: "nature,landscape,travel"
          PEXELS_PER_PAGE: "20"

          # ── Pixabay Music ───────────────────────────────────────────
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          MUSIC_QUERY: "ambient relaxing cinematic"
          MUSIC_VOLUME: "0.8"

          # ── Instagram Graph API ─────────────────────────────────────
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

          # ── GitHub Gist state sync ──────────────────────────────────
          # GH_PAT must NOT be named GITHUB_TOKEN — that name is reserved
          # by GitHub Actions and gets overridden with a repo-scoped token
          # that cannot write to Gists.
          GH_PAT: ${{ secrets.GH_PAT }}
          STATE_GIST_ID: ${{ secrets.STATE_GIST_ID }}

          # ── Content ─────────────────────────────────────────────────
          CAPTION_THEME: "inspirational"
          DEFAULT_HASHTAGS: "#nature,#beautiful,#photography,#explore,#adventure"
          INSTAGRAM_MUSIC_QUERIES: ""

          # ── Posting rules ───────────────────────────────────────────
          MAX_VIDEO_DURATION_SECONDS: "60"
          MIN_ASPECT_RATIO: "0.5"
          MAX_ASPECT_RATIO: "2.0"

          # ── Logging ─────────────────────────────────────────────────
          LOG_LEVEL: "INFO"

        run: python main.py
